# Production proxy for TinyPNG web compression APIs.
# Put this inside the same server block that serves the React app.
#
# Frontend request:
#   /api/tinypng/backend/opt/store
#
# Upstream request:
#   https://tinypng.com/backend/opt/store

location /api/tinypng/ {
  proxy_pass https://tinypng.com/;
  proxy_ssl_server_name on;

  proxy_set_header Host tinypng.com;
  proxy_set_header Origin https://tinypng.com;
  proxy_set_header Referer https://tinypng.com/;

  proxy_http_version 1.1;
  proxy_set_header Connection "";

  client_max_body_size 25m;
  proxy_request_buffering off;
}
